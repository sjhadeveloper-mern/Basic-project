<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;

        }
        .container{
            height:100vh;
            width:100vw;
            display: flex;;
            justify-content: center;
            align-items: center;

        }
        .main{
            background-color: aqua;
           display: flex;
           flex-direction: column-reverse;
        justify-content: center;
           align-items: center;
           gap:30px;
            height: 500px;
            width: 100%;
        }
        .box-1{
            background-color: purple;
            width:150px;
            height:100px;
         
        

        }
         .box-2{
            background-color: blue;
             width:150px;
            height:100px;
        }
        .box-3{
            background-color: red;
             width:150px;
            height:100px;
        }
        .main{
             display: flex;
        }
    </style>
</head>
<body>
    <div class="container">


<div class="main">
     
        <div class="box-1">box-1</div>
       <div class="box-2">box-2</div> 
        
        <div class="box-3">box-3</div>
     </div>
    </div>
</body>
</html>
