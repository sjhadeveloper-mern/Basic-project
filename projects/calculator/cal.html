<html lang="en">
<head>

     <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
    <div class="container">
        <div class="main">
            <h1>Calculator</h1>
            <div class="inputs">
                <div class="input-in">
                <label for="in-1">First Value:</label>
    <input type="number" class="in-1" id="in-1">
    </div>
    <div class="input-in">
     <label for="in-1">Second Value:</label>
      <input type="number" class="in-2"  id="in-2">
      </div>
      <label >Output:</label>
      <div class="output"></div>
      </div>
      <div class="btns">
      <button class="btn-1">Add</button>
      <button class="btn-2">Sub</button>
      <button class="btn-3">Mul</button>
      <button class="btn-4">Div</button>
      </div>
      </div>
      </div>
